<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <div class="row main">
      <button id="dec" class="step" title="Zoom out">&minus;</button>
      <div class="readout">
        <input id="level" type="number" min="25" max="500" step="1" inputmode="numeric" />
        <span class="unit">%</span>
      </div>
      <button id="inc" class="step" title="Zoom in">+</button>
    </div>

    <div class="row presets">
      <button class="preset" data-zoom="50">50</button>
      <button class="preset" data-zoom="75">75</button>
      <button class="preset" data-zoom="90">90</button>
      <button class="preset" data-zoom="100">100</button>
      <button class="preset" data-zoom="110">110</button>
      <button class="preset" data-zoom="125">125</button>
      <button class="preset" data-zoom="150">150</button>
    </div>

    <div class="row footer">
      <label class="stepsize">
        Step
        <select id="stepsize">
          <option value="1">1%</option>
          <option value="2">2%</option>
          <option value="5" selected>5%</option>
          <option value="10">10%</option>
        </select>
      </label>
      <button id="reset" class="reset">Reset to 100%</button>
    </div>

    <div id="error" class="error" hidden></div>

    <div class="row shortcuts">
      <button id="shortcuts" class="link" type="button">Customize keyboard shortcuts</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
